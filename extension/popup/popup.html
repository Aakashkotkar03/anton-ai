<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=280">
  <title>Anton AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      min-height: 160px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #FFFFFF;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2563EB, #1D4ED8);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }
    .logo span {
      color: white;
      font-size: 16px;
      font-weight: 800;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      color: #0F172A;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 11px;
      color: #94A3B8;
      margin-bottom: 16px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 10px;
      background: #F8FAFC;
      width: 100%;
      margin-bottom: 8px;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #10B981; }
    .dot.disconnected { background: #94A3B8; }

    .status-text {
      font-size: 12px;
      color: #334155;
      font-weight: 500;
    }

    .hint {
      font-size: 11px;
      color: #94A3B8;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .version {
      font-size: 10px;
      color: #CBD5E1;
    }
  </style>
</head>
<body>
  <div class="logo"><span>A</span></div>
  <div class="title">Anton AI</div>
  <div class="subtitle">by Local Intelligence</div>

  <div class="status-row">
    <div id="dot" class="dot disconnected"></div>
    <span id="statusText" class="status-text">Checking...</span>
  </div>

  <p id="hint" class="hint"></p>

  <div class="version">v1.0.0</div>

  <script>
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('statusText');
    const hint = document.getElementById('hint');

    chrome.runtime.sendMessage({ type: 'antonai:getStatus' }, (response) => {
      if (response && response.connected) {
        dot.className = 'dot connected';
        statusText.textContent = 'Connected';
        hint.textContent = 'Anton AI is running on your PC.';
      } else {
        dot.className = 'dot disconnected';
        statusText.textContent = 'Not connected';
        hint.textContent = 'Open the Anton AI desktop app to connect.';
      }
    });
  </script>
</body>
</html>
